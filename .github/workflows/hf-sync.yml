name: Sync to Hugging Face Space
on:
  push:
    branches: [main]

  # to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          
          # Remove the frontend folder so Hugging Face doesn't reject its binary images
          git rm -r --cached frontend/
          git commit -m "Deploy backend (excluding frontend)"
          
          git remote add space https://Nischaya008:$HF_TOKEN@huggingface.co/spaces/Nischaya008/civicpulseng-backend
          git push --force space HEAD:main
