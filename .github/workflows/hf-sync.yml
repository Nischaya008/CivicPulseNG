name: Sync to Hugging Face Space
on:
  push:
    branches: [main]

  # to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          
          # Create a fresh branch with no history to avoid pushing past binary files
          git checkout --orphan hf-deploy
          
          # Remove the frontend folder from being staged
          git rm -rf --cached frontend/
          
          # Create a Hugging Face specific README.md just for this deployment
          cat << 'EOF' > README.md
          ---
          title: CivicPulseNG Backend
          emoji: 🏙️
          colorFrom: green
          colorTo: blue
          sdk: docker
          app_port: 7860
          ---
          # CivicPulseNG Backend
          EOF
          
          git add README.md
          
          git commit -m "Deploy backend (excluding frontend history)"
          
          git remote add space https://Nischaya008:$HF_TOKEN@huggingface.co/spaces/Nischaya008/civicpulseng-backend
          
          # Force push this single, clean commit to the Space's main branch
          git push --force space hf-deploy:main
